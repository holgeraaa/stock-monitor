name: A股盯盘推送

on:
  schedule:
    # 高频触发 - 每5分钟检查一次，脚本内部判断交易时段
    - cron: '*/5 1-6 * * 1-5'  # UTC 1:00-6:59 = 北京时间 9:00-14:59
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        run: python monitor.py

      - name: Status
        if: always()
        run: echo "盯盘完成 $(TZ='Asia/Shanghai' date)"
