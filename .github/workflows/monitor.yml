name: A股盯盘推送

on:
  schedule:
    # 高频触发 - 每5分钟检查一次，脚本内部判断交易时段
    # UTC 1:00-7:55 = 北京时间 9:00-15:55（脚本会过滤非交易时段）
    - cron: '*/5 1-7 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        run: python monitor.py

      - name: Commit state
        if: always()
        run: |
          git config user.email "monitor@github.com"
          git config user.name "Monitor Bot"
          git add portfolio_state.json
          git commit -m "update portfolio state $(TZ='Asia/Shanghai' date '+%H:%M')" || echo "no changes"
          git push || echo "push failed"
