name: A股盯盘推送

on:
  schedule:
    # 每半小时触发一次，脚本内部判断交易时段
    # 北京时间 9:30, 10:00, 10:30, 11:00, 11:30, 13:00, 13:30, 14:00, 14:30, 15:00
    # UTC = 北京-8小时
    - cron: '30 1,2,3,4,5,6 * * 1-5'     # 北京 9:30-14:30
    - cron: '0 2,3,4,5,6,7 * * 1-5'       # 北京 10:00-15:00
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        run: python monitor.py

      - name: Commit state
        if: always()
        run: |
          git config user.email "monitor@github.com"
          git config user.name "Monitor Bot"
          git add portfolio_state.json
          git commit -m "update portfolio state $(TZ='Asia/Shanghai' date '+%H:%M')" || echo "no changes"
          git push || echo "push failed"
